<!--Main ui file.-->
<!--This file is the main HTML file for the renderer process.
   It is loaded by the BrowserWindow in the main process, and serves as the entry point for the UI.-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'"/>
    <title>Mark11</title>
    <link rel="stylesheet" href="../styles/app.css">
</head>
<body>
<div class="appContainer">
    <aside class="sidebar">
        <div class="sidebarHeader">
            <h3 id="sidebar-title">Mark11</h3>
        </div>
        <div class="sidebarToolbar">
            <div class="tooltipWrapper" data-tooltip="New note">
                <img src="../../assets/icons/new-file.svg" alt="Create new file" id="create-file-btn" draggable="false">
            </div>
            <div class="tooltipWrapper" data-tooltip="Open note">
                <img src="../../assets/icons/open-file.svg" alt="Open file" id="open-file-btn" draggable="false">
            </div>
            <div class="tooltipWrapper" data-tooltip="Settings">
                <img src="../../assets/icons/settings.svg" alt="Settings" id="settings-btn" draggable="false">
            </div>
        </div>
        <div class="sidebarBody">
            <div id="note-wrapper"></div>
        </div>
        <dialog class="settingsDialog" id="settings-dialog">
            <aside class="settingsSidebar">
                <div class="settingsSidebarTitle">Settings</div>
                <button class="settingsCloseBtn" id="dialog-close-btn">&times;</button>
                <div class="settingsNavItem active" data-page="appearance">
                    <img src="../../assets/icons/appearance.svg" class="settingsNavIcon" alt="Appearance" draggable="false">
                    Appearance
                </div>
                <div class="settingsNavItem" data-page="editor">
                    <img src="../../assets/icons/editor.svg" class="settingsNavIcon" alt="Editor" draggable="false">
                    Editor
                </div>
                <div class="settingsNavItem" data-page="about">
                    <img src="../../assets/icons/about.svg" class="settingsNavIcon" alt="About" draggable="false">
                    About
                </div>
            </aside>

            <div class="settingsPage active" id="page-appearance">
                <div class="settingsGroupLabel">Theme</div>
                <div class="settingsGroup">
                    <div class="settingsRow">
                        <div>
                            <div class="settingsRowLabel">Color Scheme</div>
                            <div class="settingsRowDesc">Choose the overall color scheme for the application.</div>
                        </div>
                        <label for="theme-select"></label><select class="settingsSelect" id="theme-select">
                            <option value="system">System</option>
                            <option value="light">Light</option>
                            <option value="dark">Dark</option>
                        </select>
                    </div>
                </div>

                <div class="settingsGroupLabel">Font</div>
                <div class="settingsGroup">
                    <div class="settingsRow">
                        <div>
                            <div class="settingsRowLabel">Font Size</div>
                            <div class="settingsRowDesc">Adjust font size in editor panel.</div>
                        </div>
                        <div class="settingsSliderWrap">
                            <label for="font-size-slider"></label><input type="range" min="12" max="24" value="16" id="font-size-slider">
                            <span class="settingsSliderValue" id="font-size-value">16px</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="settingsPage" id="page-editor">
                <div class="settingsGroupLabel">Editor</div>
                <div class="settingsGroup">
                    <div class="settingsRow">
                        <div>
                            <div class="settingsRowLabel">Spellcheck</div>
                            <div class="settingsRowDesc">Choose the spell check mode.</div>
                        </div>
                        <label class="settingsToggle">
                            <input type="checkbox" id="spellcheck-toggle">
                            <div class="settingsToggleTrack"></div>
                            <div class="settingsToggleThumb"></div>
                        </label>
                    </div>
                </div>
            </div>

            <div class="settingsPage" id="page-about">
                <div class="settingsGroupLabel">About</div>
                <div class="settingsGroup">
                    <div class="settingsRow">
                        <div>
                            <div class="settingsRowLabel">Version</div>
                            <div class="settingsRowDesc" id="app-version"></div>
                        </div>
                    </div>
                </div>

                <div class="settingsGroupLabel">Component Versions</div>
                <div class="settingsGroup">
                    <div class="settingsRow">
                        <div>
                            <div class="settingsRowLabel">Component Versions</div>
                            <div class="settingsRowDesc" id="component-versions"></div>
                        </div>
                    </div>
                </div>

                <div class="settingsGroupLabel">Test</div>
                <div class="settingsGroup">
                    <div class="settingsRow">
                        <div>
                            <div class="settingsRowLabel">Test Update</div>
                            <div class="settingsRowDesc">Test update.</div>
                        </div>
                    </div>
                </div>
            </div>

        </dialog>
    </aside>

    <main class="editor">
        <div class="editorToolbar">
            <button id="edit-btn" class="editorToolbarBtn active">Edit</button>
            <button id="preview-btn" class="editorToolbarBtn">Preview</button>
        </div>
        <label for="editor"></label><textarea id="editor" name="editor" placeholder="Create or open a note" disabled></textarea>
        <div id="preview" class="preview hidden"></div>
    </main>
</div>
<script type="module" src="../scripts/app.js"></script>
</body>
</html>
